name: Towel Electron Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
      fail-fast: false

    steps:
      - name: Check out Git repository
        uses: actions/checkout@v4

      # 1. Set up Go with CGO enabled for SQLite
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Install build dependencies (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc libsqlite3-dev

      - name: Install build dependencies (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          brew install sqlite3

      # 2. Build Go Backend
      - name: Build Go Backend (Windows)
        if: matrix.os == 'windows-latest'
        working-directory: ./backend_go
        shell: cmd
        run: |
          set CGO_ENABLED=1
          go build -o ../backend-server.exe .

      - name: Build Go Backend (Unix)
        if: matrix.os != 'windows-latest'
        working-directory: ./backend_go
        run: |
          export CGO_ENABLED=1
          go build -o ../backend-server .

      # 3. Set up Node.js
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # 4. Build Frontend with API URL for Electron
      - name: Build Frontend
        working-directory: ./frontend
        shell: bash
        run: |
          npm install
          VITE_API_BASE_URL=http://localhost:8000 npm run build

      # 5. Install Electron dependencies
      - name: Install Electron dependencies
        run: npm install

      # 6. Build Electron app
      - name: Build Electron (Windows)
        if: matrix.os == 'windows-latest'
        shell: cmd
        run: |
          set GH_TOKEN=${{ secrets.GITHUB_TOKEN }}
          npx electron-builder --win --publish always

      - name: Build Electron (macOS)
        if: matrix.os == 'macos-latest'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          npx electron-builder --mac --publish always

      - name: Build Electron (Linux)
        if: matrix.os == 'ubuntu-latest'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          npx electron-builder --linux --publish always

      # 7. Upload artifacts (fallback if publish fails)
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: towel-${{ matrix.os }}
          path: |
            dist/*.exe
            dist/*.dmg
            dist/*.AppImage
            dist/*.deb
            dist/*.zip
            dist/*.dmg
            dist/*.snap
            dist/*.rpm
            dist/*.tar.gz
            dist/*.7z
            dist/*.pkg
          if-no-files-found: ignore